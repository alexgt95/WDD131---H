<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RecipeBook</title>

    <meta property="og:type" content="website" />
    <meta property="og:title" content="RecipeBook" />
    <meta property="og:description" content="Find delicious recipes" />
    <meta property="og:url" content="Your URL" />
    <meta property="og:image" content="social-preview-image.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="RecipeBook" />
    <meta name="twitter:description" content="Find delicious recipes" />
    <meta name="twitter:image" content="social-preview-image.png" />

    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Special+Elite&family=Lato:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>

    <header>
      <img src="images/recipe-book.png" alt="RecipeBook logo" class="logo-img" />
      <span class="logo-text">RecipeBook</span>
    </header>

    <div class="search-wrapper">
      <label for="search" class="visually-hidden">Enter Search</label>
      <input id="search" type="text" placeholder="Find a recipe" />
      <button class="search-btn" aria-label="Search">
        <img src="images/search.svg" alt="" />
      </button>
    </div>

    <div id="recipe-container"></div>

    <footer>
      <a
        href="https://www.flaticon.com/free-icons/recipe"
        title="recipe icons"
        class="attribution"
        >Recipe icons created by Freepik - Flaticon</a
      >
      <div class="social">
        <a href="#" aria-label="Instagram">
          <img src="images/instagram_icon.svg" alt="instagram icon" />
        </a>
        <a href="#" aria-label="YouTube">
          <img src="images/youtube_icon.svg" alt="youtube icon" />
        </a>
        <a href="#" aria-label="Pinterest">
          <img src="images/pinterest_icon.svg" alt="pinterest icon" />
        </a>
      </div>
    </footer>

    <script src="main.js"></script>
  </body>
</html>
